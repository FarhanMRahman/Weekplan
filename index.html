<style>
  :root {
    --bg: #0a0a0a;
    --bg-raised: #141414;
    --bg-card: #1a1a1a;
    --border: #2a2a2a;
    --border-soft: #222;
    --text: #ededed;
    --text-dim: #8a8a8a;
    --text-faint: #555;
    --amber: #e8a33d;
    --amber-dim: #6b5226;
    --green: #5a9e6f;
    --green-dim: #2a4030;
    --blue: #5b8fc9;
    --red: #c2554d;
    font-size: 16px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  #app {
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 90px;
  }

  /* HEADER */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(10px);
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border-soft);
  }
  .app-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 6px;
  }
  .topbar-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .week-label {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .week-nav {
    display: flex;
    gap: 6px;
  }
  .week-nav button {
    background: var(--bg-raised);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-size: 22px;
    font-weight: 600;
    padding: 6px 18px;
    min-width: 44px;
    min-height: 44px;
    border-radius: 10px;
    cursor: pointer;
    line-height: 1.2;
    touch-action: manipulation;
  }
  .tabs {
    display: flex;
    gap: 2px;
    margin-top: 12px;
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--bg-card);
    color: var(--text);
  }

  .view { padding: 16px 18px 0; }
  .hidden { display: none !important; }

  /* WEEK GRID VIEW */
  .day-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .day-card.today {
    border-color: var(--amber-dim);
    box-shadow: 0 0 0 1px var(--amber-dim);
  }
  .day-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 8px;
  }
  .day-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .day-name .today-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    margin-right: 6px;
    vertical-align: middle;
  }
  .day-hours {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .budget-bar {
    height: 4px;
    background: var(--border-soft);
    margin: 0 14px 10px;
    border-radius: 3px;
    overflow: hidden;
  }
  .budget-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.25s ease, background 0.25s ease;
  }
  .budget-fill.over { background: var(--red); }

  .day-tasks {
    padding: 0 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .day-empty {
    padding: 4px 14px 12px;
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 9px;
    background: var(--bg-raised);
  }
  .task-row.done { opacity: 0.45; }
  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 13px;
    color: transparent;
  }
  .task-check.checked {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1200;
  }
  .cat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .cat-work { background: var(--blue); }
  .cat-house { background: var(--amber); }
  .cat-fitness { background: var(--green); }

  .task-text {
    flex: 1;
    font-size: 14.5px;
    line-height: 1.3;
  }
  .task-row.done .task-text { text-decoration: line-through; }
  .task-hours {
    font-size: 12px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .task-remove {
    color: var(--text-faint);
    font-size: 18px;
    padding: 0 2px 0 4px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .add-to-day {
    margin: 4px 10px 8px;
    text-align: center;
    padding: 8px;
    border-radius: 9px;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
  }

  .day-walk-note {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 2px 14px 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-soft);
  }
  .day-walk-note-label {
    font-size: 12.5px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .day-walk-input {
    flex: 1;
    background: var(--bg-raised);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-size: 13.5px;
    padding: 7px 10px;
    border-radius: 8px;
    min-width: 0;
  }
  .day-walk-input::placeholder { color: var(--text-faint); }

  .prayer-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px 14px;
  }
  .prayer-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .prayer-circle {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: transparent;
    cursor: pointer;
    flex-shrink: 0;
  }
  .prayer-circle.checked {
    background: var(--green);
    border-color: var(--green);
    color: #0d1f12;
  }
  .prayer-label {
    font-size: 10.5px;
    color: var(--text-faint);
  }

  /* POOL VIEW */
  .pool-section { margin-bottom: 22px; }
  .pool-section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 6px 2px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .pool-section-head .cat-dot { width: 9px; height: 9px; }
  .pool-section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .pool-section-total {
    font-size: 12px;
    color: var(--text-faint);
    margin-left: auto;
  }
  .pool-section-chevron {
    font-size: 12px;
    color: var(--text-faint);
    transition: transform 0.15s;
    margin-left: 2px;
    flex-shrink: 0;
  }
  .pool-section-chevron.collapsed { transform: rotate(-90deg); }
  .pool-section-body {
    overflow: hidden;
  }
  .pool-section-body.collapsed { display: none; }

  .pool-task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 11px;
    margin-bottom: 7px;
  }
  .pool-task-text {
    flex: 1;
    font-size: 14.5px;
  }
  .pool-task-hrs {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-raised);
    padding: 3px 7px;
    border-radius: 6px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .pool-task-assign {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 7px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .pool-task-del {
    color: var(--text-faint);
    font-size: 17px;
    padding: 2px 2px 2px 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .pool-empty {
    font-size: 13px;
    color: var(--text-faint);
    font-style: italic;
    padding: 6px 2px;
  }

  .add-task-form {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .add-task-form input[type=text] {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 10px;
    font-size: 14.5px;
  }
  .add-task-form input[type=number] {
    width: 56px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 8px;
    border-radius: 10px;
    font-size: 14.5px;
    text-align: center;
  }
  .add-task-form button {
    background: var(--amber);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
  }
  input::placeholder { color: var(--text-faint); }

  /* SUMMARY STRIP */
  .summary-strip {
    display: flex;
    gap: 8px;
    padding: 14px 18px 6px;
  }
  .summary-pill {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .summary-pill .n {
    font-size: 19px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .summary-pill .l {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* MODAL (day picker) */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: flex-end;
    z-index: 50;
  }
  .modal-sheet {
    background: var(--bg-card);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 18px 28px;
    border-top: 1px solid var(--border);
  }
  .modal-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .day-pick-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 4px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 14.5px;
    cursor: pointer;
  }
  .day-pick-row:last-child { border-bottom: none; }
  .day-pick-row .pct {
    font-size: 12px;
    color: var(--text-faint);
  }
  .modal-cancel {
    margin-top: 12px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14.5px;
    padding: 10px;
    cursor: pointer;
  }

  /* Multi-day checkbox rows */
  .day-pick-row.multi {
    cursor: pointer;
  }
  .day-pick-row.multi .check-box {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--text-faint);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-right: 10px;
    font-size: 12px;
    flex-shrink: 0;
    color: transparent;
  }
  .day-pick-row.multi.selected .check-box {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1200;
  }
  .day-pick-row.multi .row-left {
    display: flex;
    align-items: center;
  }
  .modal-confirm {
    margin-top: 14px;
    text-align: center;
    background: var(--amber);
    color: #1a1200;
    font-weight: 700;
    font-size: 14.5px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
  }
  .modal-confirm.disabled {
    background: var(--bg-raised);
    color: var(--text-faint);
    cursor: default;
  }
  .modal-subtext {
    font-size: 12.5px;
    color: var(--text-dim);
    margin: -6px 0 12px;
  }

  /* Recurring task creation */
  .recur-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .recur-toggle .switch {
    width: 34px; height: 20px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .recur-toggle .switch::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    background: var(--text-dim);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.15s, background 0.15s;
  }
  .recur-toggle.on .switch { background: var(--amber-dim); }
  .recur-toggle.on .switch::after {
    transform: translateX(14px);
    background: var(--amber);
  }
  .recur-panel {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-soft);
  }
  .recur-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .recur-preset-chip {
    font-size: 12.5px;
    padding: 6px 11px;
    border-radius: 16px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
  }
  .recur-preset-chip.active {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }
  .recur-days-row {
    display: flex;
    gap: 5px;
    justify-content: space-between;
  }
  .recur-day-chip {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
  }
  .recur-day-chip.active {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1200;
  }

  .recurring-badge {
    font-size: 10px;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 5px;
    padding: 1px 5px;
    margin-left: 2px;
    flex-shrink: 0;
  }

  .concurrent-badge {
    display: inline-block;
    font-size: 11px;
    color: var(--green);
    border: 1px solid var(--green-dim);
    border-radius: 5px;
    padding: 1px 6px;
    margin-left: 6px;
  }

  .split-note {
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  /* Edit task modal */
  .edit-field-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  .edit-field-label:first-of-type { margin-top: 0; }
  .edit-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .edit-input-row input[type=text] {
    flex: 1;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 13px;
    border-radius: 10px;
    font-size: 15px;
  }
  .edit-input-row input[type=number] {
    width: 72px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 8px;
    border-radius: 10px;
    font-size: 15px;
    text-align: center;
  }
  .no-duration-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .no-duration-toggle .switch {
    width: 34px; height: 20px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .no-duration-toggle .switch::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    background: var(--text-dim);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.15s, background 0.15s;
  }
  .no-duration-toggle.on .switch { background: var(--amber-dim); }
  .no-duration-toggle.on .switch::after {
    transform: translateX(14px);
    background: var(--amber);
  }
  .no-duration-toggle.disabled {
    opacity: 0.4;
    cursor: default;
  }
  .concurrent-picker {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .concurrent-option {
    padding: 11px 13px;
    border-radius: 10px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .concurrent-option.selected {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--text);
  }
  .modal-unassign {
    margin-top: 14px;
    text-align: center;
    color: var(--blue);
    font-size: 14px;
    padding: 10px;
    cursor: pointer;
  }
  .modal-delete {
    margin-top: 6px;
    text-align: center;
    color: var(--red);
    font-size: 14px;
    padding: 10px;
    cursor: pointer;
  }
  .task-text.editable { cursor: pointer; }
  .task-hours.no-duration { color: var(--text-faint); font-style: italic; }

  /* FAB / bottom bar handled by tabs already */

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
    font-size: 14px;
  }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="app-name">Weekplan</div>
    <div class="topbar-row">
      <div class="week-label" id="weekLabel">Loading…</div>
      <div class="week-nav">
        <button id="prevWeek">‹</button>
        <button id="nextWeek">›</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="week">This Week</div>
      <div class="tab" data-tab="pool">Task Pool</div>
    </div>
  </div>

  <div class="summary-strip" id="summaryStrip"></div>

  <div class="view" id="weekView"></div>
  <div class="view hidden" id="poolView"></div>
</div>

<div id="modalRoot"></div>

<script>
(function(){
  "use strict";

  // ---------- Constants ----------
  var DAYS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
  var DAY_FULL = {MON:"Monday",TUE:"Tuesday",WED:"Wednesday",THU:"Thursday",FRI:"Friday",SAT:"Saturday",SUN:"Sunday"};
  var CATS = [
    {id:"work", label:"Work", dotClass:"cat-work"},
    {id:"house", label:"Household", dotClass:"cat-house"},
    {id:"fitness", label:"Fitness", dotClass:"cat-fitness"}
  ];
  var PRAYERS = [
    {id:"fajr", label:"Fajr"},
    {id:"dhuhr", label:"Dhuhr"},
    {id:"asr", label:"Asr"},
    {id:"maghrib", label:"Maghrib"},
    {id:"isha", label:"Isha"}
  ];
  var DAY_HOUR_BUDGET = 2.5; // soft target hours of pool-task work per day (work+house combined), used for bar coloring

  var STORAGE_KEY = "weekplan:data:v1";

  // ---------- State ----------
  var state = null; // loaded async

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  function defaultState(){
    return {
      pool: [],
      weeks: {} // key: weekKey (monday iso date) -> { MON:[taskInstance...], ... }
    };
  }

  // taskInstance shape when assigned to a day: {id, poolId (or null if one-off), cat, text, hours, done}

  // ---------- Date / week helpers ----------
  function startOfWeek(d){
    var date = new Date(d);
    var day = date.getDay(); // 0 Sun .. 6 Sat
    var diff = (day === 0 ? -6 : 1 - day); // move to Monday
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function isoDate(d){
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function fmtShort(d){
    return (d.getMonth()+1) + "/" + d.getDate();
  }

  var today = new Date();
  var currentWeekStart = startOfWeek(today);

  function weekKey(weekStart){
    return isoDate(weekStart);
  }
  function weekLabelStr(weekStart){
    var end = new Date(weekStart);
    end.setDate(end.getDate()+6);
    return fmtShort(weekStart) + " – " + fmtShort(end);
  }
  function todayDayCode(){
    if (weekKey(currentWeekStart) !== weekKey(startOfWeek(today))) return null;
    var idx = (today.getDay() === 0) ? 6 : today.getDay()-1;
    return DAYS[idx];
  }

  function ensureWeek(wk){
    var isNew = !state.weeks[wk];
    if (isNew){
      var obj = {};
      DAYS.forEach(function(d){ obj[d] = []; });
      state.weeks[wk] = obj;
    }
    if (isNew){
      seedRecurringTasks(wk);
    }
    ensureWeekMeta(wk);
    return state.weeks[wk];
  }

  // Day-level metadata (walk note, prayer tracking) lives in a separate "meta"
  // object alongside the existing day-keyed task arrays, so older saved weeks
  // that don't have this yet just get it backfilled safely on next view.
  function ensureWeekMeta(wk){
    if (!state.weeks[wk].meta) state.weeks[wk].meta = {};
    DAYS.forEach(function(d){
      if (!state.weeks[wk].meta[d]){
        state.weeks[wk].meta[d] = {walkNote: "", prayers: {fajr:false, dhuhr:false, asr:false, maghrib:false, isha:false}};
      }
      // backfill safety for partially-missing fields on existing saved data
      if (state.weeks[wk].meta[d].walkNote === undefined) state.weeks[wk].meta[d].walkNote = "";
      if (!state.weeks[wk].meta[d].prayers) state.weeks[wk].meta[d].prayers = {fajr:false, dhuhr:false, asr:false, maghrib:false, isha:false};
    });
  }

  function seedRecurringTasks(wk){
    var weekData = state.weeks[wk];
    state.pool.forEach(function(task){
      seedSingleRecurringTaskIntoWeek(task, wk);
    });
  }

  // Seeds one recurring task into one week's data, skipping days already populated for it.
  // Used both for brand-new weeks (seedRecurringTasks) and for immediately applying a
  // freshly-created recurring task to the week currently being viewed.
  function seedSingleRecurringTaskIntoWeek(task, wk){
    if (!task.recurring || !task.recurDays) return;
    var weekData = state.weeks[wk];
    if (!weekData) return;
    task.recurDays.forEach(function(dayCode){
      var already = weekData[dayCode].some(function(t){ return t.poolId === task.id; });
      if (already) return;
      var newTaskInstance = {
        id: uid(),
        poolId: task.id,
        cat: task.cat,
        text: task.text,
        done: false
      };
      if (task.hours !== undefined && task.hours !== null) newTaskInstance.hours = task.hours;
      weekData[dayCode].push(newTaskInstance);
    });
  }

  // ---------- Storage ----------
  // Uses plain localStorage since this runs as a standalone hosted page (not inside a Claude artifact).
  // Wrapped in try/catch and returns a Promise so the rest of the app's async flow stays unchanged.
  function loadState(){
    return new Promise(function(resolve){
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw){
          try { state = JSON.parse(raw); }
          catch(e){ state = defaultState(); }
        } else {
          state = defaultState();
        }
      } catch(e){
        // localStorage unavailable (private mode, etc.) - fall back to in-memory only
        console.error("localStorage unavailable, using in-memory state", e);
        state = defaultState();
      }
      if (!state.pool) state.pool = [];
      if (!state.weeks) state.weeks = {};
      resolve();
    });
  }

  var saveTimer = null;
  function saveState(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch(e){
        console.error("save failed", e);
      }
    }, 150);
  }

  // ---------- Rendering ----------
  var activeTab = "week";

  function catInfo(catId){
    for (var i=0;i<CATS.length;i++){ if (CATS[i].id===catId) return CATS[i]; }
    return CATS[0];
  }

  function recurLabel(t){
    if (!t.recurDays || t.recurDays.length === 0) return "recurring";
    if (t.recurDays.length === 7) return "daily";
    if (t.recurDays.length === 5 && ["MON","TUE","WED","THU","FRI"].every(function(d){ return t.recurDays.indexOf(d) > -1; })) return "weekdays";
    return t.recurDays.join("/");
  }

  function render(){
    renderSummary();
    if (activeTab === "week") renderWeekView();
    else renderPoolView();
  }

  function renderSummary(){
    var wk = weekKey(currentWeekStart);
    var weekData = state.weeks[wk] || {};
    var totalDone = 0, totalTasks = 0, hoursPlanned = 0;
    DAYS.forEach(function(d){
      var list = weekData[d] || [];
      list.forEach(function(t){
        totalTasks++;
        if (t.done) totalDone++;
        hoursPlanned += (t.hours||0);
      });
    });
    var poolCount = state.pool.length;
    var strip = document.getElementById("summaryStrip");
    strip.innerHTML =
      pill(totalDone + "/" + totalTasks, "done this week") +
      pill(hoursPlanned.toFixed(1)+"h", "planned") +
      pill(String(poolCount), "in pool");
  }
  function pill(n,l){
    return '<div class="summary-pill"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';
  }

  function renderWeekView(){
    document.getElementById("weekLabel").textContent = weekLabelStr(currentWeekStart);
    var wk = weekKey(currentWeekStart);
    var weekData = ensureWeek(wk);
    var todayCode = todayDayCode();

    var html = "";
    DAYS.forEach(function(dCode){
      var list = weekData[dCode] || [];
      var dateObj = new Date(currentWeekStart);
      dateObj.setDate(dateObj.getDate() + DAYS.indexOf(dCode));
      var isToday = (dCode === todayCode);

      var hoursTotal = 0, hoursDone = 0, untimedCount = 0, untimedDone = 0;
      list.forEach(function(t){
        if (t.concurrentWith){
          // piggybacking on another task's time - doesn't add to the day's load
          return;
        }
        if (t.hours === undefined || t.hours === null){
          untimedCount++;
          if (t.done) untimedDone++;
        } else {
          hoursTotal += t.hours;
          if (t.done) hoursDone += t.hours;
        }
      });
      var pct = hoursTotal > 0 ? Math.min(100, (hoursDone/hoursTotal)*100) : 0;
      var overBudget = hoursTotal > (DAY_HOUR_BUDGET*1.6);
      var hoursLabel = hoursDone.toFixed(1)+' / '+hoursTotal.toFixed(1)+'h';
      if (untimedCount > 0) hoursLabel += '  ·  '+untimedDone+'/'+untimedCount+' untimed';

      html += '<div class="day-card'+(isToday?' today':'')+'" data-day="'+dCode+'">';
      html += '<div class="day-head"><div class="day-name">'+(isToday?'<span class="today-dot"></span>':'')+DAY_FULL[dCode]+', '+fmtShort(dateObj)+'</div>';
      html += '<div class="day-hours">'+hoursLabel+'</div></div>';
      html += '<div class="budget-bar"><div class="budget-fill'+(overBudget?' over':'')+'" style="width:'+pct+'%"></div></div>';

      if (list.length === 0){
        html += '<div class="day-empty">Nothing planned yet</div>';
      } else {
        html += '<div class="day-tasks">';
        list.forEach(function(t){
          var ci = catInfo(t.cat);
          var concurrentLabel = "";
          if (t.concurrentWith){
            var linkedTask = list.find(function(x){ return x.id === t.concurrentWith; });
            if (linkedTask) concurrentLabel = '<span class="concurrent-badge">⏱ with '+escapeHtml(linkedTask.text)+'</span>';
          }
          var hrsTag = (t.concurrentWith || t.hours === undefined || t.hours === null) ? "" : '<div class="task-hours">'+formatHrs(t.hours)+'</div>';
          html += '<div class="task-row'+(t.done?' done':'')+'" data-task="'+t.id+'" data-day="'+dCode+'">';
          html += '<div class="task-check'+(t.done?' checked':'')+'" data-action="toggle">'+(t.done?'✓':'')+'</div>';
          html += '<div class="cat-dot '+ci.dotClass+'"></div>';
          html += '<div class="task-text editable" data-action="edit">'+escapeHtml(t.text)+concurrentLabel+'</div>';
          html += hrsTag;
          html += '<div class="task-remove" data-action="remove">×</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      html += '<div class="add-to-day" data-day="'+dCode+'" data-action="addToDay">+ add task to this day</div>';

      var meta = weekData.meta[dCode];
      html += '<div class="day-walk-note">';
      html += '<span class="day-walk-note-label">Walked</span>';
      html += '<input type="text" class="day-walk-input" data-day="'+dCode+'" data-role="walkNote" value="'+escapeAttr(meta.walkNote)+'" placeholder="e.g. 1.5h">';
      html += '</div>';

      html += '<div class="prayer-row">';
      PRAYERS.forEach(function(p){
        var checked = !!meta.prayers[p.id];
        html += '<div class="prayer-item">';
        html += '<div class="prayer-circle'+(checked?' checked':'')+'" data-action="togglePrayer" data-day="'+dCode+'" data-prayer="'+p.id+'">'+(checked?'✓':'')+'</div>';
        html += '<div class="prayer-label">'+p.label+'</div>';
        html += '</div>';
      });
      html += '</div>';

      html += '</div>';
    });

    document.getElementById("weekView").innerHTML = html;
    bindWeekViewEvents();
  }

  function formatHrs(h){
    if (h === undefined || h === null) return "";
    return roundHr(h) + "h";
  }

  function escapeHtml(s){
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function bindWeekViewEvents(){
    var view = document.getElementById("weekView");
    view.querySelectorAll(".task-check").forEach(function(el){
      el.addEventListener("click", function(e){
        var row = e.target.closest(".task-row");
        var day = row.getAttribute("data-day");

        toggleTaskDone(day, id);
      });
    });
    view.querySelectorAll('[data-action="remove"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var row = e.target.closest(".task-row");
        var day = row.getAttribute("data-day");
        var id = row.getAttribute("data-task");
        removeTaskFromDay(day, id);
      });
    });
    view.querySelectorAll('[data-action="edit"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var row = e.target.closest(".task-row");

        var id = row.getAttribute("data-task");
        openEditTaskModal(day, id);
      });
    });
    view.querySelectorAll(".add-to-day").forEach(function(el){
      el.addEventListener("click", function(e){
        var day = e.target.getAttribute("data-day");
        openAssignFromPoolModal(day);
      });
    });

    // Walk note: save on input, but DON'T re-render the whole view on every
    // keystroke - that would rebuild the DOM and kick the input out of focus
    // on iOS. We only call saveState() (debounced) here; the next full render
    // (e.g. switching days/weeks) will reflect it from state.
    view.querySelectorAll('[data-role="walkNote"]').forEach(function(el){
      el.addEventListener("input", function(e){
        var day = el.getAttribute("data-day");
        var wk = weekKey(currentWeekStart);
        ensureWeekMeta(wk);
        state.weeks[wk].meta[day].walkNote = el.value;
        saveState();
      });
    });

    view.querySelectorAll('[data-action="togglePrayer"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var day = el.getAttribute("data-day");
        var prayerId = el.getAttribute("data-prayer");
        var wk = weekKey(currentWeekStart);
        ensureWeekMeta(wk);
        var current = !!state.weeks[wk].meta[day].prayers[prayerId];
        state.weeks[wk].meta[day].prayers[prayerId] = !current;
        saveState();
        // small in-place visual toggle instead of a full render, so rapid
        // taps across the row feel instant and nothing else shifts around
        el.classList.toggle("checked", !current);
        el.textContent = !current ? "✓" : "";
      });
    });
  }

  function toggleTaskDone(dayCode, taskId){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    var t = list.find(function(x){ return x.id === taskId; });
    if (t){ t.done = !t.done; saveState(); render(); }
  }
  function removeTaskFromDay(dayCode, taskId){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    // detach any tasks that were riding on this one's time, so they don't
    // silently disappear from the hour total with a dangling reference
    list.forEach(function(x){
      if (x.concurrentWith === taskId) delete x.concurrentWith;
    });
    state.weeks[wk][dayCode] = list.filter(function(x){ return x.id !== taskId; });
    saveState();
    render();
  }

  // Moves a task instance off this day and back into the Task Pool so it can be
  // re-assigned later. If the original pool task still exists (e.g. it's recurring
  // and stayed in the pool), nothing new is created. Otherwise a fresh pool entry
  // is recreated from this instance's text/hours/category so it has somewhere to go.
  function unassignTaskFromDay(dayCode, taskId){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    var t = list.find(function(x){ return x.id === taskId; });
    if (!t) return;

    var existingPoolTask = t.poolId ? state.pool.find(function(p){ return p.id === t.poolId; }) : null;
    if (!existingPoolTask){
      var recreated = {id: uid(), cat: t.cat, text: t.text};
      if (t.hours !== undefined && t.hours !== null) recreated.hours = t.hours;
      state.pool.push(recreated);
    }
    // if it was recurring and still in the pool, it's already there - nothing to do.

    // detach anything that was piggybacking on this instance's time
    list.forEach(function(x){
      if (x.concurrentWith === taskId) delete x.concurrentWith;
    });
    state.weeks[wk][dayCode] = list.filter(function(x){ return x.id !== taskId; });
    saveState();
    render();
  }

  // transient UI state for the edit modal's "no duration" toggle and concurrent picker
  var editNoDuration = false;
  var editConcurrentWith = null; // null = not concurrent, otherwise the id of the task it rides along with

  function openEditTaskModal(dayCode, taskId){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    var t = list.find(function(x){ return x.id === taskId; });
    if (!t) return;
    editNoDuration = (t.hours === undefined || t.hours === null);
    editConcurrentWith = t.concurrentWith || null;
    renderEditTaskModal(dayCode, t);
  }

  function renderEditTaskModal(dayCode, t){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    // other tasks on this same day that this task could piggyback on (exclude itself and anything already concurrent with this one, to avoid chains)
    var otherTasks = list.filter(function(x){ return x.id !== t.id && !x.concurrentWith; });

    var html = '<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">';
    html += '<div class="modal-title">Edit task</div>';

    html += '<div class="edit-field-label">Task</div>';
    html += '<div class="edit-input-row"><input type="text" id="editTextInput" value="'+escapeAttr(t.text)+'"></div>';

    html += '<div class="edit-field-label">Duration</div>';
    html += '<div class="edit-input-row"><input type="number" min="0" step="0.25" id="editHoursInput" value="'+(editNoDuration ? "" : t.hours)+'" '+((editNoDuration||editConcurrentWith)?"disabled":"")+' placeholder="hr"></div>';

    html += '<div class="no-duration-toggle'+(editNoDuration?' on':'')+(editConcurrentWith?' disabled':'')+'" id="editNoDurToggle"><div class="switch"></div><span>No set duration (e.g. done passively)</span></div>';

    if (otherTasks.length > 0){
      html += '<div class="edit-field-label">Doing this at the same time as…</div>';
      html += '<div class="concurrent-picker">';
      html += '<div class="concurrent-option'+(editConcurrentWith===null?' selected':'')+'" data-concurrent="">None — counts on its own</div>';
      otherTasks.forEach(function(other){
        html += '<div class="concurrent-option'+(editConcurrentWith===other.id?' selected':'')+'" data-concurrent="'+other.id+'">'+escapeHtml(other.text)+'</div>';
      });
      html += '</div>';
      if (editConcurrentWith){
        html += '<div class="modal-subtext">This task\'s time won\'t be added to the day\'s total — it\'s already covered by the task above.</div>';
      }
    }

    html += '<div class="modal-confirm" id="modalSaveEdit">Save</div>';
    html += '<div class="modal-unassign" id="modalUnassign">Unassign — back to Task Pool</div>';
    html += '<div class="modal-delete" id="modalDeleteEdit">Remove from this day</div>';
    html += '<div class="modal-cancel" id="modalCancel">Cancel</div>';
    html += '</div></div>';

    document.getElementById("modalRoot").innerHTML = html;
    document.getElementById("modalCancel").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", function(e){
      if (e.target.id === "modalOverlay") closeModal();
    });

    document.getElementById("editNoDurToggle").addEventListener("click", function(){
      if (editConcurrentWith) return; // duration is moot while concurrent
      editNoDuration = !editNoDuration;
      var textVal = document.getElementById("editTextInput").value;
      t = Object.assign({}, t, {text: textVal});
      renderEditTaskModal(dayCode, t);
    });

    document.querySelectorAll("[data-concurrent]").forEach(function(el){
      el.addEventListener("click", function(){
        var val = el.getAttribute("data-concurrent");
        editConcurrentWith = val === "" ? null : val;
        var textVal = document.getElementById("editTextInput").value;
        t = Object.assign({}, t, {text: textVal});
        renderEditTaskModal(dayCode, t);
      });
    });

    document.getElementById("modalSaveEdit").addEventListener("click", function(){
      var newText = document.getElementById("editTextInput").value.trim();
      if (!newText) return;
      var newHours = null;
      if (!editNoDuration && !editConcurrentWith){
        var hVal = parseFloat(document.getElementById("editHoursInput").value);
        newHours = (isNaN(hVal) || hVal <= 0) ? null : roundHr(hVal);
      }
      saveTaskEdit(dayCode, t.id, newText, newHours, editConcurrentWith);
      closeModal();
    });

    document.getElementById("modalUnassign").addEventListener("click", function(){
      unassignTaskFromDay(dayCode, t.id);
      closeModal();
    });

    document.getElementById("modalDeleteEdit").addEventListener("click", function(){
      removeTaskFromDay(dayCode, t.id);
      closeModal();
    });
  }

  function escapeAttr(s){
    return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  }

  function saveTaskEdit(dayCode, taskId, newText, newHours, concurrentWith){
    var wk = weekKey(currentWeekStart);
    var list = state.weeks[wk][dayCode];
    var t = list.find(function(x){ return x.id === taskId; });
    if (!t) return;
    t.text = newText;
    if (newHours === null){
      delete t.hours;
    } else {
      t.hours = newHours;
    }
    if (concurrentWith){
      t.concurrentWith = concurrentWith;
    } else {
      delete t.concurrentWith;
    }
    // safety: if other tasks were piggybacking on this one and this one just became
    // concurrent with something else, leave them as-is (they still ride on this task's
    // existence, not its own concurrency state) - no cascade needed.
    saveState();
    render();
  }

  // transient UI state: which pool categories are collapsed (persists only for this session)
  var collapsedCats = {};

  // ---------- Pool view ----------
  function renderPoolView(){
    var html = "";
    CATS.forEach(function(cat){
      var items = state.pool.filter(function(t){ return t.cat === cat.id; });
      var totalH = items.reduce(function(s,t){ return s + (t.hours||0); }, 0);

      html += '<div class="cat-dot '+cat.dotClass+'"></div>';
      html += '<div class="pool-section-title">'+cat.label+'</div>';
      html += '<div class="pool-section-total">'+(totalH > 0 ? totalH.toFixed(1)+'h total' : items.length+' task'+(items.length!==1?'s':''))+'</div>';
      html += '<div class="pool-section-chevron'+(isCollapsed?' collapsed':'')+'">▾</div>';
      html += '</div>';

      html += '<div class="pool-section-body'+(isCollapsed?' collapsed':'')+'" data-body="'+cat.id+'">';

          html += '<div class="pool-task-text">'+escapeHtml(t.text)+(t.recurring ? '<span class="recurring-badge">'+recurLabel(t)+'</span>' : '')+'</div>';
          html += hrsTag;
          html += '<div class="pool-task-assign" data-action="assign" data-id="'+t.id+'">Assign</div>';
          html += '<div class="pool-task-del" data-action="delPool" data-id="'+t.id+'">×</div>';

      html += '<input type="number" min="0.25" step="0.25" placeholder="hr" data-role="hours">';

      html += '</div>';
      html += '<div class="recur-toggle" data-action="toggleRecur" data-cat="'+cat.id+'"><div class="switch"></div><span>Make this recurring</span></div>';

      html += '<div class="recur-presets">';

      html += '<div class="recur-preset-chip" data-preset="weekdays" data-cat="'+cat.id+'">Weekdays</div>';
      html += '<div class="recur-preset-chip" data-preset="weekly" data-cat="'+cat.id+'">Once a week</div>';
      html += '<div class="recur-preset-chip" data-preset="custom" data-cat="'+cat.id+'">Custom</div>';
      html += '</div>';
      html += '<div class="recur-days-row" data-recur-days="'+cat.id+'">';
      DAYS.forEach(function(d){
        html += '<div class="recur-day-chip" data-day-chip="'+d+'" data-cat="'+cat.id+'">'+d.charAt(0)+'</div>';
      });
      html += '</div>';
      html += '</div>';

      html += '</div>'; // close pool-section-body
      html += '</div>'; // close pool-section
    });

    document.getElementById("poolView").innerHTML = html;
    bindPoolViewEvents();
  }

  // track recurring-toggle UI state per category, transient (not saved)
  var recurUiState = {}; // cat -> {on:bool, days:[...]}
  function getRecurUi(cat){
    if (!recurUiState[cat]) recurUiState[cat] = {on:false, days:[]};
    return recurUiState[cat];
  }

  function bindPoolViewEvents(){
    var view = document.getElementById("poolView");
    view.querySelectorAll('[data-action="toggleCollapse"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var cat = el.getAttribute("data-cat");
        collapsedCats[cat] = !collapsedCats[cat];
        var chevron = el.querySelector(".pool-section-chevron");
        var body = view.querySelector('[data-body="'+cat+'"]');
        chevron.classList.toggle("collapsed", !!collapsedCats[cat]);
        body.classList.toggle("collapsed", !!collapsedCats[cat]);
      });
    });
    view.querySelectorAll('[data-action="assign"]').forEach(function(el){
      el.addEventListener("click", function(e){
        openAssignDayModal(e.target.getAttribute("data-id"));
      });
    });
    view.querySelectorAll('[data-action="delPool"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var id = e.target.getAttribute("data-id");
        state.pool = state.pool.filter(function(t){ return t.id !== id; });
        saveState();
        renderPoolView();
        renderSummary();
      });
    });
    view.querySelectorAll('[data-action="addPool"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var cat = e.target.getAttribute("data-cat");
        var form = e.target.closest(".add-task-form");
        var textInput = form.querySelector('[data-role="text"]');
        var hoursInput = form.querySelector('[data-role="hours"]');
        var text = textInput.value.trim();
        var hoursRaw = hoursInput.value.trim();
        if (!text) return;
        var hours = null;
        if (hoursRaw !== ""){
          var parsed = parseFloat(hoursRaw);
          if (!isNaN(parsed) && parsed > 0) hours = roundHr(parsed);
        }

        var ui = getRecurUi(cat);
        var newTask = {id: uid(), cat: cat, text: text};
        if (hours !== null) newTask.hours = hours;
        if (ui.on && ui.days.length > 0){
          newTask.recurring = true;
          newTask.recurDays = ui.days.slice();
        }
        state.pool.push(newTask);

        // If this new task is recurring, apply it immediately to the week
        // currently being viewed too - not just future weeks created later.
        if (newTask.recurring){
          var wk = weekKey(currentWeekStart);
          ensureWeek(wk); // make sure the week object exists before seeding into it
          seedSingleRecurringTaskIntoWeek(newTask, wk);
        }

        textInput.value = "";
        hoursInput.value = "";
        // reset recur ui for this cat
        recurUiState[cat] = {on:false, days:[]};

        saveState();
        renderPoolView();
        renderSummary();
      });
    });
    // enter key support
    view.querySelectorAll('.add-task-form input[type=text]').forEach(function(inp){
      inp.addEventListener("keydown", function(e){
        if (e.key === "Enter"){
          var btn = inp.closest(".add-task-form").querySelector("button");
          btn.click();
        }
      });
    });

    // recurring toggle switch
    view.querySelectorAll('[data-action="toggleRecur"]').forEach(function(el){
      el.addEventListener("click", function(e){
        var cat = el.getAttribute("data-cat");
        var ui = getRecurUi(cat);
        ui.on = !ui.on;
        el.classList.toggle("on", ui.on);
        var panel = view.querySelector('[data-recur-panel="'+cat+'"]');
        panel.classList.toggle("hidden", !ui.on);
      });
    });

    // preset chips
    view.querySelectorAll('[data-preset]').forEach(function(el){
      el.addEventListener("click", function(e){
        var cat = el.getAttribute("data-cat");
        var preset = el.getAttribute("data-preset");
        var ui = getRecurUi(cat);
        if (preset === "daily") ui.days = DAYS.slice();
        else if (preset === "weekdays") ui.days = ["MON","TUE","WED","THU","FRI"];
        else if (preset === "weekly") ui.days = [todayDayCode() || "MON"];
        else if (preset === "custom") { /* leave days as-is, let user pick chips */ }

        // update preset chip active states
        var panel = el.closest(".recur-panel");
        panel.querySelectorAll(".recur-preset-chip").forEach(function(c){ c.classList.remove("active"); });
        el.classList.add("active");

        // update day chip visuals
        panel.querySelectorAll(".recur-day-chip").forEach(function(dc){
          var d = dc.getAttribute("data-day-chip");
          dc.classList.toggle("active", ui.days.indexOf(d) > -1);
        });
      });
    });

    // individual day chips (toggle membership, switches preset to custom implicitly)
    view.querySelectorAll('[data-day-chip]').forEach(function(el){
      el.addEventListener("click", function(e){
        var cat = el.getAttribute("data-cat");
        var day = el.getAttribute("data-day-chip");
        var ui = getRecurUi(cat);
        var idx = ui.days.indexOf(day);
        if (idx > -1) ui.days.splice(idx,1);
        else ui.days.push(day);
        el.classList.toggle("active", ui.days.indexOf(day) > -1);
        // clear preset highlight since it's now custom
        var panel = el.closest(".recur-panel");
        panel.querySelectorAll(".recur-preset-chip").forEach(function(c){ c.classList.remove("active"); });
        panel.querySelector('[data-preset="custom"]').classList.add("active");
      });
    });
  }

  // ---------- Assign modal (pick day(s) for a pool task, with split support) ----------
  var assignSelection = []; // transient: days selected in the current modal

  function openAssignDayModal(poolId){
    var task = state.pool.find(function(t){ return t.id === poolId; });
    if (!task) return;
    var wk = weekKey(currentWeekStart);
    var weekData = ensureWeek(wk);
    assignSelection = []; // start empty - fully manual selection, no suggestion

    renderAssignModal(task, weekData);
  }

  function renderAssignModal(task, weekData){
    var hrsLabel = (task.hours === undefined || task.hours === null) ? "" : ' ('+formatHrs(task.hours)+')';
    var html = '<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">';
    html += '<div class="modal-title">Assign "'+escapeHtml(task.text)+'"'+hrsLabel+'</div>';
    html += '<div class="modal-subtext">Tap to select one or more days.</div>';

    DAYS.forEach(function(d){
      var load = (weekData[d]||[]).reduce(function(s,t){ return s+(t.hours||0); }, 0);
      var sel = assignSelection.indexOf(d) > -1;
      html += '<div class="day-pick-row multi'+(sel?' selected':'')+'" data-pick="'+d+'">';
      html += '<span class="row-left"><span class="check-box">✓</span>'+DAY_FULL[d]+'</span>';
      html += '<span class="pct">'+load.toFixed(1)+'h loaded</span>';
      html += '</div>';
    });

    var splitCount = assignSelection.length;

    html += '<div class="modal-confirm'+(splitCount===0?' disabled':'')+'" id="modalConfirmAssign">'+(splitCount>1 ? "Assign to "+splitCount+" days" : "Assign")+'</div>';
    html += '<div class="modal-cancel" id="modalCancel">Cancel</div>';
    html += '</div></div>';

    document.getElementById("modalRoot").innerHTML = html;
    document.getElementById("modalCancel").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", function(e){
      if (e.target.id === "modalOverlay") closeModal();
    });
    document.querySelectorAll("[data-pick]").forEach(function(el){
      el.addEventListener("click", function(e){
        var day = e.currentTarget.getAttribute("data-pick");
        var idx = assignSelection.indexOf(day);
        if (idx > -1) assignSelection.splice(idx,1);
        else assignSelection.push(day);
        renderAssignModal(task, weekData);
      });
    });
    var confirmBtn = document.getElementById("modalConfirmAssign");
    if (assignSelection.length > 0){
      confirmBtn.addEventListener("click", function(){
        assignPoolTaskToDays(task.id, assignSelection.slice());
        closeModal();
      });
    }
  }

  function roundHr(h){
    return Math.round(h*100)/100;
  }

  function assignPoolTaskToDays(poolId, dayCodes){
    var task = state.pool.find(function(t){ return t.id === poolId; });
    if (!task || dayCodes.length === 0) return;
    var wk = weekKey(currentWeekStart);
    var weekData = ensureWeek(wk);
    var hasHours = (task.hours !== undefined && task.hours !== null);

    dayCodes.forEach(function(dayCode){
      var newTaskInstance = {
        id: uid(),
        poolId: task.id,
        cat: task.cat,
        text: task.text,
        done: false
      };
      if (hasHours) newTaskInstance.hours = task.hours;
      weekData[dayCode].push(newTaskInstance);
    });

    // remove from pool unless recurring
    if (!task.recurring){
      state.pool = state.pool.filter(function(t){ return t.id !== poolId; });
    }
    saveState();
    render();
  }

  // For "+ add task to this day" from week view -> show pool list to pick from, or quick-add
  function openAssignFromPoolModal(dayCode){
    var html = '<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">';
    html += '<div class="modal-title">Add to '+DAY_FULL[dayCode]+'</div>';
    if (state.pool.length === 0){
      html += '<div class="pool-empty">No tasks in pool. Add some in Task Pool tab first.</div>';
    } else {
      state.pool.forEach(function(t){
        var ci = catInfo(t.cat);
        html += '<div class="day-pick-row" data-assign="'+t.id+'"><span><span class="cat-dot '+ci.dotClass+'" style="display:inline-block;margin-right:7px;"></span>'+escapeHtml(t.text)+'</span><span class="pct">'+formatHrs(t.hours)+'</span></div>';
      });
    }
    html += '<div class="modal-cancel" id="modalCancel">Cancel</div>';
    html += '</div></div>';
    document.getElementById("modalRoot").innerHTML = html;
    document.getElementById("modalCancel").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", function(e){
      if (e.target.id === "modalOverlay") closeModal();
    });
    document.querySelectorAll("[data-assign]").forEach(function(el){

      });

  }

  function closeModal(){
    document.getElementById("modalRoot").innerHTML = "";
  }

  // ---------- Tabs & week nav ----------
  document.querySelectorAll(".tab").forEach(function(el){
    el.addEventListener("click", function(){
      activeTab = el.getAttribute("data-tab");
      document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
      el.classList.add("active");
      document.getElementById("weekView").classList.toggle("hidden", activeTab !== "week");
      document.getElementById("poolView").classList.toggle("hidden", activeTab !== "pool");
      render();
    });
  });

  function goToPrevWeek(){
    currentWeekStart.setDate(currentWeekStart.getDate()-7);
    currentWeekStart = startOfWeek(currentWeekStart);
    render();
  }
  function goToNextWeek(){
    currentWeekStart.setDate(currentWeekStart.getDate()+7);
    currentWeekStart = startOfWeek(currentWeekStart);
    render();
  }

  var prevBtn = document.getElementById("prevWeek");
  var nextBtn = document.getElementById("nextWeek");

  prevBtn.addEventListener("click", goToPrevWeek);
  nextBtn.addEventListener("click", goToNextWeek);
  // Defensive: some iOS Safari contexts (home-screen web app mode) can swallow
  // synthetic click events on rapid taps. Bind touchend as a backup, guarding
  // against double-firing by preventing the default (which would otherwise
  // also dispatch a click).
  prevBtn.addEventListener("touchend", function(e){ e.preventDefault(); goToPrevWeek(); });
  nextBtn.addEventListener("touchend", function(e){ e.preventDefault(); goToNextWeek(); });

  // ---------- Boot ----------
  loadState().then(function(){
    render();
  });

})();
</script>
</body>
</html>
